          - generic [ref=e163]:
            - heading "Why Arrow" [level=2] [ref=e164]
            - generic [ref=e165]:
              - paragraph [ref=e166]: "Arrow is a reactive UI framework built around JavaScript primitives: Modules, functions, and template literals. Arrow is just TypeScript, so your coding agent already knows how to use it really well."
              - paragraph [ref=e167]: "You only need 3 functions:"
              - list [ref=e168]:
                - listitem [ref=e169]:
                  - code [ref=e170]: reactive
                - listitem [ref=e171]:
                  - code [ref=e172]: html
                - listitem [ref=e173]:
                  - code [ref=e174]: component
              - paragraph [ref=e175]: Unlike other major frameworks, there is no "idomatic" way to use Arrow since it's just TypeScript functions and template literals. The entire documentation fits in less than 5% of a 200k context window.
              - paragraph [ref=e176]:
                - text: Arrow requires no build step, no JSX compilation, no React compiler, no Vite plugin (there is one if you need SSR), no Vue template complier, and yet it runs incredibly fast at less than 5kb over the wire. When coupled with the
                - link "Arrow sandbox" [ref=e177] [cursor=pointer]:
                  - /url: "#sandbox"
                - text: ", it's perfect for interfaces produced by chat agents too."
