name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      recover_unpublished:
        description: Retry package versions already committed but missing from npm
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: npm install --global npm@11.18.0

      - name: Registry release-train preflight
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.recover_unpublished }}" == "true" ]]; then
            pnpm check:release-registry -- --allow-unpublished-with-changesets
          else
            pnpm check:release-registry
          fi

      - run: pnpm --filter "./packages/*" build

      - run: pnpm check:publication-surface

      - name: Packed consumer publication contract
        run: pnpm check:packed-consumers

      - name: Public API snapshot contract
        run: pnpm check:public-api-snapshot

      - name: Detect release intent
        id: release_intent
        shell: bash
        run: |
          has_changesets=false
          if find .changeset -maxdepth 1 -type f -name '*.md' -print -quit | grep -q .; then
            has_changesets=true
          fi

          has_version_changes=false
          if git rev-parse --verify HEAD^ >/dev/null 2>&1 && \
            git diff --unified=0 HEAD^ HEAD -- 'packages/*/package.json' | \
            grep -Eq '^[+-][[:space:]]*"version"[[:space:]]*:'; then
            has_version_changes=true
          fi

          recover_unpublished=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.recover_unpublished }}" == "true" ]]; then
            recover_unpublished=true
          fi

          if [[ "$has_changesets" == true || "$has_version_changes" == true || "$recover_unpublished" == true ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets or package version changes; release is a no-op." >> "$GITHUB_STEP_SUMMARY"
          fi

      - id: changesets
        if: steps.release_intent.outputs.run == 'true' && inputs.recover_unpublished != true
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Recover committed unpublished versions
        id: recovery_publish
        if: github.event_name == 'workflow_dispatch' && inputs.recover_unpublished
        run: |
          pnpm changeset publish
          echo "published=true" >> "$GITHUB_OUTPUT"
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Generate SBOM (CycloneDX)
        if: steps.changesets.outputs.published == 'true' || steps.recovery_publish.outputs.published == 'true'
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@2.0.0 \
            --output-format JSON \
            --output-file sbom.cdx.json \
            --short-PURLs \
            --ignore-npm-errors
      - name: Upload SBOM artifact
        if: steps.changesets.outputs.published == 'true' || steps.recovery_publish.outputs.published == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
