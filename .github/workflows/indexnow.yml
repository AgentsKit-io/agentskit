name: Ping search engines

# After a production Vercel deploy succeeds, push the live sitemap URLs to
# IndexNow (Bing/Yandex/DuckDuckGo/Ecosia) and, if a service account is
# configured, Google's Indexing API. Google also recrawls the sitemap on its
# own — this just makes it faster.

on:
  deployment_status:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    # Only on a successful *production* deploy.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Production')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node apps/docs-next/scripts/ping-indexnow.mjs

      # No-ops when GOOGLE_INDEXING_SA is unset, so leaving the secret
      # unconfigured is safe.
      - name: Google Indexing API
        env:
          GOOGLE_INDEXING_SA: ${{ secrets.GOOGLE_INDEXING_SA }}
        run: node apps/docs-next/scripts/ping-google.mjs
