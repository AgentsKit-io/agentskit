name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changeset-lint:
    name: Changeset lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for changeset
        run: |
          # Skip if PR only touches docs/examples (no package source changes)
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          NEEDS_CHANGESET=$(echo "$CHANGED" | grep -E '^packages/' || true)

          if [ -z "$NEEDS_CHANGESET" ]; then
            echo "No changes inside packages/ — changeset not required."
            exit 0
          fi

          echo "Package changes detected. Verifying changeset exists..."
          pnpm changeset status --since=origin/main

  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter "./packages/*" build

      - run: pnpm --filter "./packages/*" lint

      - name: Quality gates (errors, exports, any, file-size, parity, docs)
        run: pnpm check:quality-gates

      - run: pnpm test
