name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changeset-lint:
    name: Changeset lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for changeset
        run: |
          # Skip if PR only touches docs/examples (no package source changes)
          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          NEEDS_CHANGESET=$(echo "$CHANGED" | grep -E '^packages/' || true)

          if [ -z "$NEEDS_CHANGESET" ]; then
            echo "No changes inside packages/ — changeset not required."
            exit 0
          fi

          echo "Package changes detected. Verifying changeset exists..."
          pnpm changeset status --since=origin/main

  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter "./packages/*" build

      - name: Publication metadata contract
        run: pnpm check:publication-surface

      - name: Packed consumer publication contract
        run: pnpm check:packed-consumers

      - name: Public API snapshot contract
        run: pnpm check:public-api-snapshot

      - run: pnpm --filter "./packages/*" lint

      - name: Quality gates (errors, exports, any, file-size, parity, docs)
        run: pnpm check:quality-gates

      - name: Doc bridge gate
        run: pnpm docs:bridge:gate

      - run: pnpm test

  compatibility:
    name: Compatibility (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 24
            experimental: false
          - node: 26
            experimental: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter "./packages/*" build

      - run: pnpm check:publication-surface

      - run: pnpm check:packed-consumers

      - run: pnpm check:public-api-snapshot
