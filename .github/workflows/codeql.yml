name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan to catch newly-published rules against unchanged code.
    - cron: '37 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      # github/codeql-action/init v4.37.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # github/codeql-action/analyze v4.37.1
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          category: '/language:${{ matrix.language }}'
