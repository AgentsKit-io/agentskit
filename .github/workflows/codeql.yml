name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan to catch newly-published rules against unchanged code.
    - cron: '37 3 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      # github/codeql-action/init v4.35.4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # github/codeql-action/analyze v4.35.4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          category: '/language:${{ matrix.language }}'
