version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/react"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/ink"
    schedule:
      interval: "weekly"
    ignore:
      # marked >=16 drops compatibility with marked-terminal@7
      # (peerDependencies: "marked": ">=1 <16"), and no marked-terminal
      # release supports marked 16+. Pinned to 15.x until it does.
      - dependency-name: "marked"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/packages/adapters"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/cli"
    schedule:
      interval: "weekly"
    ignore:
      # commander 15 requires node >=22.12.0; the CLI stays installable on
      # node 20 LTS. Revisit when the project raises its node floor.
      - dependency-name: "commander"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/packages/runtime"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/tools"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/skills"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/memory"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/observability"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/rag"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/sandbox"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/packages/eval"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/apps/docs-next"
    schedule:
      interval: "weekly"
